<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>专注力训练 - 舒尔特方格</title>
    <style>
        :root {
            --primary-color: #4a90e2;
            --success-color: #2ecc71;
            --error-color: #e74c3c;
            --bg-color: #f0f7ff;
            --cell-bg: #ffffff;
            --cell-hover: #e6f2ff;
        }

        body {
            font-family: 'Comic Sans MS', 'Microsoft YaHei', sans-serif;
            background-color: var(--bg-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        h1 {
            color: #333;
            margin-bottom: 20px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
        }

        .controls {
            background: white;
            padding: 15px 30px;
            border-radius: 15px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            margin-bottom: 20px;
            display: flex;
            gap: 15px;
            align-items: center;
            flex-wrap: wrap;
            justify-content: center;
        }

        select {
            padding: 8px 15px;
            border-radius: 8px;
            border: 2px solid var(--primary-color);
            font-size: 16px;
            outline: none;
        }

        button {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 10px 25px;
            border-radius: 25px;
            font-size: 18px;
            cursor: pointer;
            transition: transform 0.1s, background-color 0.2s;
            font-weight: bold;
        }

        button:hover {
            background-color: #357abd;
            transform: scale(1.05);
        }

        button:active {
            transform: scale(0.95);
        }

        .timer {
            font-size: 24px;
            font-weight: bold;
            color: #333;
            min-width: 100px;
            text-align: center;
        }

        #grid-container {
            display: grid;
            gap: 10px;
            background: white;
            padding: 15px;
            border-radius: 15px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.1);
            margin-bottom: 20px;
            /* 默认 3x3，会在 JS 中动态调整 */
            grid-template-columns: repeat(3, 1fr);
        }

        .cell {
            background-color: var(--cell-bg);
            border: 2px solid #ddd;
            border-radius: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 24px;
            font-weight: bold;
            color: #333;
            cursor: pointer;
            user-select: none;
            transition: all 0.2s;
            width: 60px;
            height: 60px;
        }

        @media (min-width: 600px) {
            .cell {
                width: 80px;
                height: 80px;
                font-size: 32px;
            }
        }

        .cell:hover {
            background-color: var(--cell-hover);
            border-color: var(--primary-color);
        }

        .cell.correct {
            background-color: var(--success-color);
            color: white;
            border-color: var(--success-color);
            animation: pop 0.3s;
        }

        .cell.wrong {
            background-color: var(--error-color);
            color: white;
            animation: shake 0.4s;
        }

        .message {
            font-size: 20px;
            color: #666;
            min-height: 30px;
            text-align: center;
        }

        @keyframes pop {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }
    </style>
</head>
<body>

    <h1>🚀 舒尔特方格挑战</h1>

    <div class="controls">
        <select id="difficulty">
            <option value="3">3 x 3 (简单)</option>
            <option value="4" selected>4 x 4 (标准)</option>
            <option value="5">5 x 5 (挑战)</option>
            <option value="6">6 x 6 (大师)</option>
        </select>
        <button onclick="startGame()">开始挑战</button>
        <div class="timer" id="timer">0.00 秒</div>
    </div>

    <div id="grid-container"></div>

    <div class="message" id="message">请点击 "开始挑战"</div>

    <script>
        let currentState = {
            isPlaying: false,
            currentNumber: 1,
            gridSize: 4,
            startTime: 0,
            timerInterval: null
        };

        const gridContainer = document.getElementById('grid-container');
        const timerElement = document.getElementById('timer');
        const messageElement = document.getElementById('message');
        const difficultySelect = document.getElementById('difficulty');

        function startGame() {
            // 重置状态
            if (currentState.timerInterval) clearInterval(currentState.timerInterval);
            
            const size = parseInt(difficultySelect.value);
            currentState = {
                isPlaying: true,
                currentNumber: 1,
                gridSize: size,
                startTime: Date.now(),
                timerInterval: null
            };

            // 生成数字并打乱
            const totalCells = size * size;
            const numbers = Array.from({length: totalCells}, (_, i) => i + 1);
            shuffleArray(numbers);

            // 渲染网格
            renderGrid(size, numbers);

            // 启动计时器
            timerElement.textContent = '0.00 秒';
            currentState.timerInterval = setInterval(updateTimer, 10);
            
            messageElement.textContent = `请按顺序点击数字：1`;
            messageElement.style.color = '#333';
        }

        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
        }

        function renderGrid(size, numbers) {
            gridContainer.innerHTML = '';
            gridContainer.style.gridTemplateColumns = `repeat(${size}, 1fr)`;

            numbers.forEach(num => {
                const cell = document.createElement('div');
                cell.className = 'cell';
                cell.textContent = num;
                cell.dataset.number = num;
                cell.onclick = () => handleCellClick(cell, num);
                gridContainer.appendChild(cell);
            });
        }

        function handleCellClick(cell, number) {
            if (!currentState.isPlaying) return;

            if (number === currentState.currentNumber) {
                // 点击正确
                cell.classList.add('correct');
                currentState.currentNumber++;
                
                // 检查是否完成
                if (currentState.currentNumber > currentState.gridSize * currentState.gridSize) {
                    endGame();
                } else {
                    messageElement.textContent = `下一个数字：${currentState.currentNumber}`;
                }
            } else {
                // 点击错误
                cell.classList.add('wrong');
                setTimeout(() => cell.classList.remove('wrong'), 400);
                // 可以在这里添加错误音效或者惩罚时间
            }
        }

        function updateTimer() {
            const now = Date.now();
            const elapsed = (now - currentState.startTime) / 1000;
            timerElement.textContent = elapsed.toFixed(2) + ' 秒';
        }

        function endGame() {
            clearInterval(currentState.timerInterval);
            currentState.isPlaying = false;
            const finalTime = timerElement.textContent;
            messageElement.textContent = `🎉 挑战成功！用时：${finalTime}`;
            messageElement.style.color = 'var(--success-color)';
            messageElement.style.fontWeight = 'bold';
        }

        // 初始化显示一个默认的网格（不可交互）
        window.onload = () => {
             const size = 4;
             const numbers = Array.from({length: 16}, (_, i) => i + 1);
             shuffleArray(numbers);
             renderGrid(size, numbers);
             // 禁用交互
             currentState.isPlaying = false;
        };
    </script>
</body>
</html>
